version: "3.8"

services:
  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.production
    environment:
      - ENV=production

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend
