version: "3.8"

services:
  backend:
    build:
      context: ./backend
      target: prod
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env.production
    environment:
      - ENV=production
      - WA_GATEWAY_URL=http://wa-gateway:8000
    depends_on:
      - wa-gateway

  frontend:
    build:
      context: ./frontend
      target: prod
    ports:
      - "80:80"
    env_file:
      - ./frontend/.env.production
    depends_on:
      - backend

  wa-gateway:
    build:
      context: ./wa-gateway
    ports:
      - "8000:8000"
    volumes:
      - wa_session:/app/.wwebjs_auth
    restart: unless-stopped

volumes:
  wa_session:
