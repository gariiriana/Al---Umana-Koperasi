# ─── High-Performance Nginx Configuration for Al-Umana ───
# Optimized for millions of concurrent users with:
# - Gzip compression (70-80% bandwidth reduction)
# - Aggressive static asset caching (hashed Vite assets: 1 year)
# - Connection limiting (prevent single-IP abuse)
# - Request rate limiting
# - Worker auto-tuning

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Performance tuning ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    keepalive_requests 1000;

    # ── Gzip compression ──
    # Reduces bandwidth by 70-80% for text-based assets.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml
        font/woff2;

    # ── Connection limiting ──
    # Prevent single-IP connection exhaustion.
    limit_conn_zone $binary_remote_addr zone=addr:10m;

    # ── Rate limiting ──
    # 30 requests/sec per IP with burst queue of 60.
    limit_req_zone $binary_remote_addr zone=req_zone:10m rate=30r/s;

    # ── Logging (production-optimised) ──
    access_log off;
    error_log /var/log/nginx/error.log warn;

    server {
        listen 80;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html index.htm;

        # ── Connection and rate limits ──
        limit_conn addr 100;
        limit_req zone=req_zone burst=60 nodelay;

        # ── Security headers ──
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Hashed static assets (Vite builds with content hashes) ──
        # These are immutable — cache for 1 year. The content hash in the
        # filename guarantees cache invalidation on code changes.
        location ~* \.(?:js|css|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Images and media ──
        location ~* \.(?:png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
            expires 30d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # ── Service Worker ──
        # Must not be cached so updates propagate immediately.
        location = /sw.js {
            expires off;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            try_files $uri =404;
        }

        # ── PWA Manifest ──
        location = /manifest.webmanifest {
            expires 1d;
            add_header Cache-Control "public";
            try_files $uri =404;
        }

        # ── SPA fallback ──
        # All non-file routes fall through to index.html for React Router.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Error pages ──
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
