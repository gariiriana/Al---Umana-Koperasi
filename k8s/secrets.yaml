# IMPORTANT: Replace placeholder values with real Base64-encoded secrets
# before applying to the cluster.
#
# To encode a value:
#   echo -n "your-value" | base64
#
# For the Firebase service account JSON file:
#   base64 -w 0 firebase-service-account.json
#
apiVersion: v1
kind: Secret
metadata:
  name: al-umana-secrets
  namespace: al-umana
  labels:
    app.kubernetes.io/part-of: al-umana
type: Opaque
data:
  # Firebase service account JSON (base64-encoded)
  firebase-service-account.json: "REPLACE_WITH_BASE64_ENCODED_SERVICE_ACCOUNT_JSON"
  # Backend .env.production values
  FIREBASE_PROJECT_ID: "REPLACE_WITH_BASE64"
  FIREBASE_API_KEY: "REPLACE_WITH_BASE64"
