apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: al-umana
  labels:
    app: backend
    app.kubernetes.io/part-of: al-umana
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: al-umana/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: al-umana-config
          env:
            - name: ENV
              value: "production"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/firebase-service-account.json"
          volumeMounts:
            - name: firebase-sa
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: firebase-sa
          secret:
            secretName: al-umana-secrets
            items:
              - key: firebase-service-account.json
                path: firebase-service-account.json
